services:
  oracle:
    image: container-registry.oracle.com/database/free:23.26.1.0
    container_name: ${CONTAINER_DB_NAME}
    restart: unless-stopped
    env_file: 
      - .env

    ports:
      - "${PORT}:1521"

    volumes:
      - oracle_dados_wsl:/opt/oracle/oradata
    
    networks:
      - computer_vision_network

    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  computer_vision_network:
    driver: bridge

volumes:
  oracle_dados_wsl:  